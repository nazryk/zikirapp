<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZikirApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans flex flex-col min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="font-['Lalezar'] text-3xl font-medium text-emerald-600 tracking-tight">ZikirApp.</h1>
            <nav class="hidden md:flex gap-6 font-medium text-slate-600">
                <a href="#home" class="hover:text-emerald-600 transition">Home</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow">
        
        <section id="home" class="max-w-5xl mx-auto px-4 py-16 md:py-24 grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
            
            <div class="flex flex-col gap-6">
                <h2 class="text-4xl md:text-5xl font-bold text-slate-900 leading-tight">
                    Tenangkan Hati dengan <span class="font-bold text-emerald-600">BerZikir</span>
                </h2>
                <div>
                    <a href="#tasbih" class="inline-block bg-emerald-600 text-white px-6 py-3 rounded-full font-semibold shadow-lg hover:bg-emerald-700 transition transform hover:-translate-y-1">
                        Mulai Zikir
                    </a>
                </div>
            </div>

            <div class="bg-white p-8 rounded-xl shadow-lg border border-emerald-100 flex flex-col justify-center min-h-[250px]">
                <div class="flex items-center gap-2 mb-4">
                    <h3 class="text-sm font-medium text-emerald-600 proportional tracking-wider">Today's Verse</h3>
                </div>
                
                <blockquote id="teks-ayat" class="text-slate-700 italic text-lg leading-relaxed mb-4">
                    <span class="animate-pulse">Mengambil ayat...</span>
                </blockquote>
                <p id="sumber-ayat" class="text-sm font-semibold text-slate-500 text-right"></p>
                
                <button onclick="fetchQuranQuote()" class="mt-4 text-xs bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full w-max hover:bg-emerald-100 transition">
                    Ganti Ayat
                </button>
            </div>
        </section>

        <section id="tasbih" class="bg-emerald-600 py-16 md:py-24">
            <div class="max-w-xl mx-auto px-4 text-center">
                <h2 class="text-3xl font-bold text-white mb-8">Tasbih Digital</h2>
                
                <div class="bg-white p-10 rounded-[3rem] shadow-2xl">
                    <div class="bg-slate-100 rounded-3xl p-8 mb-8 border-4 border-slate-200">
                        <p id="angka-tasbih" class="text-7xl font-black text-slate-800 tabular-nums transition-transform duration-100">0</p>
                    </div>

                    <div class="mb-8">
                        <label for="pilihan-zikir" class="block text-sm font-bold text-emerald-600 mb-2 uppercase tracking-wider">Pilih Bacaan Zikir</label>
                        
                        <select id="pilihan-zikir" class="font-['Amiri_Quran'] w-full p-4 border-2 border-emerald-200 rounded-2xl outline-none bg-emerald-50 text-emerald-800 text-4xl text-center appearance-none cursor-pointer hover:border-emerald-400 focus:ring-4 focus:ring-emerald-200 transition-all dir-rtl leading-relaxed">                            <option value="subhanallah">سُبْحَانَ اللَّهِ</option>
                            <option value="alhamdulillah">الْحَمْدُ لِلَّهِ</option>
                            <option value="allahuakbar">اللَّهُ أَكْبَرُ</option>
                            <option value="lailahaillallah">لَا إِلٰهَ إِلَّا اللَّٰهُ</option>
                            <option value="astaghfirullah">أَسْتَغْفِرُ اللَّهَ</option>
                        </select>
                        
                        <p id="teks-latin" class="mt-3 text-lg text-slate-500 font-semibold">Subhanallah</p>
                    </div>

                    <div class="flex justify-center gap-6 items-end">
                        <button onclick="resetAngka()" class="w-16 h-16 rounded-full bg-slate-200 text-slate-600 font-bold text-lg hover:bg-slate-300 transition shadow-md flex items-center justify-center">
                            Reset
                        </button>
                            
                        <button onclick="tambahAngka()" class="w-32 h-32 rounded-full bg-emerald-500 text-white font-extrabold text-5xl hover:bg-emerald-400 active:bg-emerald-700 transition shadow-[0_10px_20px_rgba(16,185,129,0.4)] flex items-center justify-center active:scale-95 transform">
                            X
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-[#ffff] text-slate-400 py-8 text-center mt-auto">
        <p>&copy; 2026 ZikirApp.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
